<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탐험 4 - 건원릉 홍살문</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 25px 120px 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-content.active {
            display: flex;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 이미지 박스 스타일 */
        .img-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            background-color: #f9f9f9;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 하단 바 및 버튼 */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #eee;
            display: none;
            justify-content: center;
            z-index: 100;
        }

        .bottom-bar.active { display: flex; }

        .btn {
            background-color: #4A60A1; 
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        /* 타이틀 & 텍스트 서식 */
        .title { font-size: 20px; font-weight: 800; margin-bottom: 25px; line-height: 1.6; color: #222; word-break: keep-all; }
        .desc { font-size: 16px; line-height: 1.8; color: #444; margin-bottom: 20px; word-break: keep-all; }
        b { color: #000; }
        .link-text { color: #4A60A1; text-decoration: underline; font-weight: bold; font-size: 17px; }
        .icon-box { font-size: 40px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="scroll-content active" id="page1">
        <div class="title">
            <span style="font-size: 0.9rem; font-weight: 500; color: #666;">세계유산 조선왕릉<br>가족 탐험대</span><br><br>
            🧭 탐험 4 건원릉 홍살문 🧭<br><br>
            조선왕릉 상설도와<br>건원릉 상설도 비교
        </div>
    </div>
    <div class="bottom-bar active" id="btn1">
        <button class="btn" onclick="nextPage(2)">탐험 시작</button>
    </div>

    <div class="scroll-content" id="page2">
        <div class="img-container">
            <img src="https://i.imgur.com/5YykmdO.png" alt="건원릉 상설도">
        </div>
        <div class="desc">
            🗺️ <b>건원릉 상설도</b> 🗺️<br><br>
            활동지의 조선왕릉 상설도와<br>비교해보자!<br><br>
            그렇다면 없어진 부분은 무엇일까?
        </div>
    </div>
    <div class="bottom-bar" id="btn2">
        <button class="btn" onclick="nextPage(3)">없어진 부분 확인하러 가기</button>
    </div>

    <div class="scroll-content" id="page3">
        <div class="icon-box">💡</div>
        <div class="title" style="font-size: 22px; color: #4A60A1; margin-bottom: 35px;">
            정답 :<br>건원릉에는 사라진 부분이 없습니다!
        </div>
        <div class="desc">
            조선왕릉 상설도에 대해<br>더 알아보고 싶다면?<br><br>
            <a href="https://portal.nrich.go.kr/kor/page.do?menuIdx=1288" target="_blank" class="link-text">👉 클릭하기 🔗</a>
        </div>
    </div>
    <div class="bottom-bar" id="btn3">
        <button class="btn" onclick="nextPage(4)">Submit</button>
    </div>

    <div class="scroll-content" id="page4">
        <div class="icon-box">🧩</div>
        <div class="desc" style="font-size: 17px; font-weight: 600; line-height: 1.9;">
            지령지 미션 2개를 모두 완료했다면,<br>
            능참봉을 찾아가 확인 후<br>
            비문 조각을 수령하세요~! 🙌<br><br>
            ⛩️ 홍살문을 통과해보자! ⛩️
        </div>
    </div>
    <div class="bottom-bar" id="btn4">
        <button class="btn" onclick="location.reload()">탐험 4 끝!</button>
    </div>

</div>

<script>
    // 페이지 전환 스크립트
    function nextPage(pageNum) {
        document.querySelectorAll('.scroll-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.bottom-bar').forEach(el => el.classList.remove('active'));
        
        const targetPage = document.getElementById('page' + pageNum);
        const targetBtn = document.getElementById('btn' + pageNum);
        
        if (targetPage && targetBtn) {
            targetPage.classList.add('active');
            targetBtn.classList.add('active');
            targetPage.scrollTo(0, 0);
        }
    }
</script>

</body>
</html>
